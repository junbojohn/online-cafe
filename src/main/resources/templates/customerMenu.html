<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Customer Menu</title>
</head>
<body>

    <h1>Menu</h1>
    <form th:action="@{/customer/menu/orders}" method="post">
        <table>
            <thead>
                <th>Name</th>
                <th>Price</th>
                <th>Rating</th>
                <th>Reviews</th>
                <th>Order Amount</th>
            </thead>

            <tbody>
                <tr th:each="menu, stat : ${menuCustomerDto.content}">
                    <td th:text="${menu.menu_name}"></td>
                    <td th:text="${menu.price}"></td>
                    <td th:text="${menu.rating}"></td>
                    <!-- <td th:text="${menu.reviews}"></td> -->
                    <td>
                        <a th:href="@{/customer/menu/reviews(page = ${0}, menuName = ${menu.menu_name}, menuId = ${menu.id})}">
                            Check reviews
                        </a>
                    </td>

                    <!--
                    <div>
                        <a th:href="@{/menu/customer/reviews(page = ${0}, menuReviews = ${menu.reviews})}">
                        <a th:href="@{/menu/customer/reviews(page = ${0}, menuName = ${menu.menu_name}, menuId = ${menu.id})}">
                            Check reviews
                        </a>
                    </div>
                    -->

                    <td>
                        <!-- <input type="number" th:name="ordered_menu_quantity" th:value="${ordered_menu_quantity[menu.id - 1]}"> -->
                        <input type="number" name="ordered_menu_quantity" th:value="${ordered_menu_quantity[stat.index]}">
                    </td>
                </tr>

                <!--
                <tr th:each="i : ${#numbers.sequence(0, ordered_menu_quantity.length - 1)}">
                    <td>
                        <input type="number" th:name="ordered_menu_quantity" th:value="${ordered_menu_quantity[i]}">
                    </td>
                </tr>
                -->
            </tbody>
        </table>

        <label>Email: </label>
        <input type="text" name="email"> <br />

        <input type="button" onclick="sample4_execDaumPostcode()" value="우편번호 찾기"><br>

        <label>우편 번호: </label>
        <input type="text" id="sample4_postcode" name="post_code" placeholder="우편 번호"> <br />

        <label>도로명 주소: </label>
        <input type="text" id="sample4_roadAddress" name="road_address" placeholder="도로명 주소"> <br />

        <label>지번 주소: </label>
        <input type="text" id="sample4_jibunAddress" name="jibun_address" placeholder="지번 주소"> <br />

        <label>상세 주소: </label>
        <input type="text" id="sample4_detailAddress" name="detail_address" placeholder="상세 주소"> <br />

        <label>참고 항목: </label>
        <input type="text" id="sample4_extraAddress" name="extra_address" placeholder="참고 항목"> <br />

        <button type="submit">Order Menu</button>
    </form>

    <br />

    <form th:action="@{/customer/menu}" method="get">
        <div>
            <label>Price lower than: </label>
            <input type="text" name="price">
        </div>

        <button type="submit">Search</button>
    </form>

    <!-- 카카오 우편번호 서비스(aka 주소 검색 API): https://postcode.map.kakao.com/guide -->
    <script src="//t1.kakaocdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <script>
        function sample4_execDaumPostcode() {
            new kakao.Postcode({
                oncomplete: function(data) {
                    // 팝업에서 검색결과 항목을 클릭했을때 실행할 코드를 작성하는 부분.

                    // 도로명 주소의 노출 규칙에 따라 주소를 표시한다.
                    // 내려오는 변수가 값이 없는 경우엔 공백('')값을 가지므로, 이를 참고하여 분기 한다.
                    var roadAddr = data.roadAddress; // 도로명 주소 변수
                    var extraRoadAddr = ''; // 참고 항목 변수

                    // 법정동명이 있을 경우 추가한다. (법정리는 제외)
                    // 법정동의 경우 마지막 문자가 "동/로/가"로 끝난다.
                    if(data.bname !== '' && /[동로가]$/.test(data.bname)){
                        extraRoadAddr += data.bname;
                    }
                    // 건물명이 있고, 공동주택일 경우 추가한다.
                    if(data.buildingName !== '' && data.apartment === 'Y'){
                        extraRoadAddr += (extraRoadAddr !== '' ? ', ' + data.buildingName : data.buildingName);
                    }
                    // 표시할 참고항목이 있을 경우, 괄호까지 추가한 최종 문자열을 만든다.
                    if(extraRoadAddr !== ''){
                        extraRoadAddr = ' (' + extraRoadAddr + ')';
                    }

                    // 우편번호와 주소 정보를 해당 필드에 넣는다.
                    document.getElementById('sample4_postcode').value = data.zonecode;
                    document.getElementById("sample4_roadAddress").value = roadAddr;
                    document.getElementById("sample4_jibunAddress").value = data.jibunAddress;

                    // 참고항목 문자열이 있을 경우 해당 필드에 넣는다.
                    if(roadAddr !== ''){
                        document.getElementById("sample4_extraAddress").value = extraRoadAddr;
                    } else {
                        document.getElementById("sample4_extraAddress").value = '';
                    }

                    var guideTextBox = document.getElementById("guide");
                    // 사용자가 '선택 안함'을 클릭한 경우, 예상 주소라는 표시를 해준다.
                    if(data.autoRoadAddress) {
                        var expRoadAddr = data.autoRoadAddress + extraRoadAddr;
                        guideTextBox.innerHTML = '(예상 도로명 주소 : ' + expRoadAddr + ')';
                        guideTextBox.style.display = 'block';

                    } else if(data.autoJibunAddress) {
                        var expJibunAddr = data.autoJibunAddress;
                        guideTextBox.innerHTML = '(예상 지번 주소 : ' + expJibunAddr + ')';
                        guideTextBox.style.display = 'block';
                    } else {
                        guideTextBox.innerHTML = '';
                        guideTextBox.style.display = 'none';
                    }
                }
            }).open();
        }
    </script>
