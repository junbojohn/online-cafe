<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Menu</title>
</head>
<body>
    <script>
        // URL of my Spring Boot endpoint
        // Spring Boot 엔드포인트의 URL 주소
        const apiURL = 'http://localhost:8080/menu/customer';

        // Function to fetch and display data
        // 데이터를 가져오고 표기할 함수
        async function loadMenuData() {
            try {
                const response = await fetch(apiURL);

                // Check if the ResponseEntity status is 200 (OK)
                // ResponseEntity의 상태가 200인지 확인
                if (!response.ok) {
                    throw new Error(`HTTP error. Status: ${response.status}`);
                }

                // Parse the JSON data from the response body
                // response에서 가져온 JSON 데이터를 파싱한다.
                const menuData = await response.json();

                // Inject data into the HTML DOM elements
                // 데이터를 HTML DOM 속성으로 삽입
                document.getElementById('menu_name').textContent = menuData.menu_name;
                document.getElementById('price').textContent = menuData.price;
                document.getElementById('rating').textContent = menuData.rating;
            }

            catch (error) {
                console.error('Error fetching data: ', error);
                document.getElementById('menu_name').textContent = 'Error loading data';
            }
        }

        window.onload = loadMenuData;
    </script>

    <h1>Menu</h1>
    <!-- Container elements for the data -->
    <p><strong>Name:</strong> <span id="menu_name">Loading...</span></p>
    <p><strong>Price:</strong> <span id="price">Loading...</span></p>
    <p><strong>Rating:</strong> <span id="rating">Loading...</span></p>
</body>
</html>
