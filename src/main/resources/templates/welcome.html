<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/js/bootstrap.bundle.min.js"></script>
    <title>Online Cafe</title>
</head>
<body>
    <div class="text-center">
        <h1 class="display-4">
            Welcome to the online cafe!
        </h1>
    </div>

    <div class="d-grid gap-3 mt-5 col-4 mx-auto">
        <h2 class="text-center">For Customers:</h2>

        <a class="btn btn-primary btn-lg" th:href="@{/customer/menu}">
            Order Menu
        </a>

        <a class="btn btn-outline-primary btn-lg" th:href="@{/customer/writeReview}">
            Write Review
        </a>
    </div>

    <hr>

    <div class="text-center">
        <h2 class="margin-bottom">For Managers:</h2>

        <a class="btn btn-dark" th:href="@{/manager/login}">
            Manager Login
        </a>

        <a class="btn btn-secondary" th:href="@{/manager/signup}">
            Manager Sign Up
        </a>
    </div>

    <a th:href="@{/manager/signup}">Manager Sign Up</a> <br />
    -->
</body>
</html>
